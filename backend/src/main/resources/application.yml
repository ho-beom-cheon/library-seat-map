spring:
  application:
    name: library-seat-map-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/libraryseat}
    username: ${SPRING_DATASOURCE_USERNAME:libraryseat}
    password: ${SPRING_DATASOURCE_PASSWORD:libraryseat}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

library:
  public-api:
    base-url: ${PUBLIC_API_BASE_URL:https://apis.data.go.kr/B551982/plr_v2}
    response-type: ${PUBLIC_API_RESPONSE_TYPE:json}
    service-key: ${DATA_GO_KR_SERVICE_KEY:}
    key-encoded: ${DATA_GO_KR_KEY_IS_ENCODED:false}
    num-of-rows: ${PUBLIC_API_NUM_OF_ROWS:500}
  sync:
    enabled: ${LIBRARY_SYNC_ENABLED:false}
    info-cron: ${LIBRARY_SYNC_INFO_CRON:0 10 3 * * *}
    realtime-delay-ms: ${LIBRARY_SYNC_REALTIME_DELAY_MS:120000}
    operation-status-enabled: ${LIBRARY_SYNC_OPERATION_STATUS_ENABLED:false}
    districts: ${LIBRARY_SYNC_DISTRICTS:1168000000}

app:
  location-logging-enabled: ${APP_LOCATION_LOGGING_ENABLED:false}
