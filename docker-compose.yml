services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: library-seat-postgres
    environment:
      POSTGRES_DB: libraryseat
      POSTGRES_USER: libraryseat
      POSTGRES_PASSWORD: libraryseat
    ports:
      - "5432:5432"
    volumes:
      - library-seat-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: library-seat-redis
    ports:
      - "6379:6379"

volumes:
  library-seat-postgres-data:
